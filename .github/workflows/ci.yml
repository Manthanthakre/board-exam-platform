name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── User Service ────────────────────────────────────────────────────────────
  user-service:
    name: User Service – Lint, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/user-service

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: user_admin
          POSTGRES_PASSWORD: user_secret
          POSTGRES_DB: user_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PORT: 3001
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: user_admin
      DB_PASSWORD: user_secret
      DB_NAME: user_db_test
      JWT_ACCESS_SECRET: ci_access_secret_at_least_32_characters_long
      JWT_REFRESH_SECRET: ci_refresh_secret_at_least_32_characters_long
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      INTERNAL_API_KEY: ci_internal_api_key_at_least_32_chars_xx
      CLOUDINARY_CLOUD_NAME: demo
      CLOUDINARY_API_KEY: "000000000000000"
      CLOUDINARY_API_SECRET: demo_secret
      THROTTLE_TTL: "60000"
      THROTTLE_LIMIT: "5"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/user-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --passWithNoTests

      - name: Build
        run: npm run build

  # ─── Result Service ───────────────────────────────────────────────────────────
  result-service:
    name: Result Service – Lint, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/result-service

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: result_admin
          POSTGRES_PASSWORD: result_secret
          POSTGRES_DB: result_db_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PORT: 3002
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: 5433
      DB_USERNAME: result_admin
      DB_PASSWORD: result_secret
      DB_NAME: result_db_test
      JWT_ACCESS_SECRET: ci_access_secret_at_least_32_characters_long
      RABBITMQ_URL: amqp://guest:guest@localhost:5672
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      USER_SERVICE_URL: http://localhost:3001
      INTERNAL_API_KEY: ci_internal_api_key_at_least_32_chars_xx

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/result-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --passWithNoTests

      - name: Build
        run: npm run build

  # ─── Notification Service ─────────────────────────────────────────────────────
  notification-service:
    name: Notification Service – Lint, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/notification-service

    env:
      PORT: 3003
      NODE_ENV: test
      MONGO_URI: mongodb://localhost:27017/notification_test
      RABBITMQ_URL: amqp://guest:guest@localhost:5672
      JWT_ACCESS_SECRET: ci_access_secret_at_least_32_characters_long
      SMTP_HOST: smtp.ethereal.email
      SMTP_PORT: "587"
      SMTP_SECURE: "false"
      SMTP_USER: test_user
      SMTP_PASS: test_pass
      SMTP_FROM: noreply@boardexam.com
      MAX_RETRIES: "3"
      RETRY_BASE_DELAY_MS: "10"

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/notification-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --passWithNoTests

      - name: Build
        run: npm run build

  # ─── Docker Build Smoke Test ──────────────────────────────────────────────────
  docker-smoke:
    name: Docker Compose Build Check
    runs-on: ubuntu-latest
    needs: [user-service, result-service, notification-service]

    steps:
      - uses: actions/checkout@v4

      - name: Build all Docker images
        run: docker compose build --parallel

      - name: Validate compose config
        run: docker compose config --quiet
